name: VaultShip CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: vaultship
  ECS_CLUSTER: vaultship-cluster
  ECS_SERVICE: vaultship-service
  CONTAINER_NAME: vaultship

permissions:
  id-token: write       # Required for OIDC auth to AWS
  contents: read
  security-events: write # Required to upload SARIF to GitHub Security tab

jobs:

  # ─────────────────────────────────────────────
  # STAGE 1: Lint
  # ─────────────────────────────────────────────
  lint:
    name: "Stage 1 · Lint"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"
          cache-dependency-path: app/package.json

      - name: Install dependencies
        working-directory: app
        run: npm install

      - name: Run ESLint
        working-directory: app
        run: npm run lint

  # ─────────────────────────────────────────────
  # STAGE 2: SAST — Secrets scan (GitLeaks)
  # ─────────────────────────────────────────────
  secrets-scan:
    name: "Stage 2 · Secrets Scan (GitLeaks)"
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history required for GitLeaks to scan all commits

      - name: Run GitLeaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .gitleaks.toml

  # ─────────────────────────────────────────────
  # STAGE 3: Build Docker image + push to ECR
  # ─────────────────────────────────────────────
  build-and-push:
    name: "Stage 3 · Build & Push to ECR"
    runs-on: ubuntu-latest
    needs: secrets-scan
    # Only push image on merges to main — not on PRs
    if: github.ref == 'refs/heads/main'
    outputs:
      image: ${{ steps.build-image.outputs.image }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # OIDC auth — no long-lived AWS keys stored anywhere
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image to ECR
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build \
            --build-arg APP_VERSION=$IMAGE_TAG \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:latest \
            .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

  # ─────────────────────────────────────────────
  # STAGE 4: Vulnerability scan (Trivy)
  # ─────────────────────────────────────────────
  trivy-scan:
    name: "Stage 4 · CVE Scan (Trivy)"
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # Fail the pipeline hard on CRITICAL CVEs
      - name: Run Trivy — fail on CRITICAL
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "${{ needs.build-and-push.outputs.image }}"
          format: "table"
          exit-code: "1"
          ignore-unfixed: true
          severity: "CRITICAL"

      # Also output SARIF for GitHub Security tab (doesn't fail the build)
      - name: Run Trivy — SARIF report
        uses: aquasecurity/trivy-action@master
        if: always()
        with:
          image-ref: "${{ needs.build-and-push.outputs.image }}"
          format: "sarif"
          output: "trivy-results.sarif"
          severity: "CRITICAL,HIGH,MEDIUM"
          ignore-unfixed: true

      - name: Upload SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: "trivy-results.sarif"

  # ─────────────────────────────────────────────
  # STAGE 5: Deploy to ECS Fargate
  # ─────────────────────────────────────────────
  deploy:
    name: "Stage 5 · Deploy to ECS Fargate"
    runs-on: ubuntu-latest
    needs: trivy-scan
    environment: production
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # Download the current task definition from ECS
      - name: Download current ECS task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition ${{ env.ECS_SERVICE }} \
            --query taskDefinition \
            > task-definition.json

      # Inject new image URI into the task definition
      - name: Update task definition with new image
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition.json
          container-name: ${{ env.CONTAINER_NAME }}
          image: ${{ needs.build-and-push.outputs.image }}

      # Register new task definition revision + update service
      - name: Deploy to ECS service
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          service: ${{ env.ECS_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true
